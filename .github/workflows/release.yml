name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            sdk_arch: arm64
          - arch: x86_64
            sdk_arch: x86_64
    steps:
      - uses: actions/checkout@v5

      - name: Build for ${{ matrix.arch }}
        run: |
          SDK=$(xcrun --show-sdk-path)
          swiftc -O -sdk "$SDK" \
            -target ${{ matrix.arch }}-apple-macosx13.0 \
            -framework Cocoa -framework CoreGraphics \
            -o topaz-${{ matrix.arch }} \
            TopazCapture.swift

      - name: Create app bundle
        run: |
          mkdir -p Topaz.app/Contents/MacOS
          cp topaz-${{ matrix.arch }} Topaz.app/Contents/MacOS/Topaz
          tar czf topaz-${{ matrix.arch }}.tar.gz topaz-${{ matrix.arch }} Topaz.app

      - uses: actions/upload-artifact@v4
        with:
          name: topaz-${{ matrix.arch }}
          path: topaz-${{ matrix.arch }}.tar.gz

  universal:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: topaz-arm64
          path: artifacts/arm64

      - uses: actions/download-artifact@v4
        with:
          name: topaz-x86_64
          path: artifacts/x86_64

      - name: Create universal binary
        run: |
          tar xzf artifacts/arm64/topaz-arm64.tar.gz -C artifacts/arm64/
          tar xzf artifacts/x86_64/topaz-x86_64.tar.gz -C artifacts/x86_64/
          lipo -create -output topaz artifacts/arm64/topaz-arm64 artifacts/x86_64/topaz-x86_64
          file topaz
          mkdir -p Topaz.app/Contents/MacOS
          cp topaz Topaz.app/Contents/MacOS/Topaz
          tar czf topaz-universal.tar.gz topaz Topaz.app

      - uses: actions/upload-artifact@v4
        with:
          name: topaz-universal
          path: topaz-universal.tar.gz

  release:
    needs: universal
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/topaz-arm64/topaz-arm64.tar.gz
            artifacts/topaz-x86_64/topaz-x86_64.tar.gz
            artifacts/topaz-universal/topaz-universal.tar.gz

  npm:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
